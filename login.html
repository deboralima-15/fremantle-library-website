<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

<body>
  <header>
    <div class="header-inner">
      <div class="brand">Fremantle City Library</div>
      <nav aria-label="Main menu">

  <main class="container">
    
<h1>Login</h1>
<form id="loginForm" class="mt-2">
  <label for="u">Email</label>
  <input id="u" type="email" required placeholder="you@example.com">

  <label for="p">Password</label>
  <input id="p" type="password" required>

  <button class="btn primary" type="submit">Login</button>
</form>

  </main>

  <div class="contactbar">
    <div class="inner">
      <div class="left">
        <p><span class="icon">✉️</span> info@fremantlelibrary.com</p>
        <p><span class="icon">📞</span> +61 8 9589 1111</p>
      </div>
      <div class="right">
        <p>Follow us: <span class="icon">▶️</span> YouTube &nbsp; <span class="icon">📘</span> Facebook &nbsp; <span class="icon">📸</span> Instagram</p>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; <span id="year"></span> Fremantle City Library. All rights reserved.</p>
  </footer>
  <script src="js/main.js"></script>
